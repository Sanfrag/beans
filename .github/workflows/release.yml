name: Build and Release AppImages

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate assets
        run: npm run generate

      - name: Build Linux binaries
        run: npm run build:linux

      - name: Install FUSE
        run: sudo apt-get install -y libfuse2t64

      - name: Build pbean AppImage
        run: ./appimage.sh pbean

      - name: Build vbean AppImage
        run: ./appimage.sh vbean

      - name: List build artifacts
        run: ls -la build/*.AppImage

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --title "$TAG" --notes "$TAG"

      - name: Upload AppImages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" build/pbean-*.AppImage build/vbean-*.AppImage --clobber
