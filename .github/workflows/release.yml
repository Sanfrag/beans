name: Build and Release AppImages

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate assets
        run: npm run generate

      - name: Build Linux binaries
        run: npm run build:linux

      - name: Install FUSE
        run: sudo apt-get install -y libfuse2t64

      - name: Build pbean AppImage
        run: ./appimage.sh pbean

      - name: Build vbean AppImage
        run: ./appimage.sh vbean

      - name: List build artifacts
        run: ls -la build/*.AppImage

      - name: Upload pbean AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PATH: build/pbean-$(grep -m1 'version = ' flake.nix | sed 's/.*version = "\([^"]*\)".*/\1/')-linux-x86_64.AppImage
        run: |
          echo "Uploading $ASSET_PATH"
          gh release upload ${{ github.event.release.tag_name }} "$ASSET_PATH" --clobber

      - name: Upload vbean AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET_PATH: build/vbean-$(grep -m1 'version = ' flake.nix | sed 's/.*version = "\([^"]*\)".*/\1/')-linux-x86_64.AppImage
        run: |
          echo "Uploading $ASSET_PATH"
          gh release upload ${{ github.event.release.tag_name }} "$ASSET_PATH" --clobber
