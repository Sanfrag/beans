name: Build and Release AppImages

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate assets
        run: npm run generate

      - name: Build Linux binaries
        run: npm run build:linux

      - name: Build pbean AppImage
        run: ./appimage.sh pbean

      - name: Build vbean AppImage
        run: ./appimage.sh vbean

      - name: List build artifacts
        run: ls -la build/*.AppImage

      - name: Upload pbean AppImage
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/pbean-*.AppImage
          asset_name: pbean.AppImage
          asset_content_type: application/vnd.appimage

      - name: Upload vbean AppImage
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: build/vbean-*.AppImage
          asset_name: vbean.AppImage
          asset_content_type: application/vnd.appimage
